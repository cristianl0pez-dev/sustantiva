services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sustantiva
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - sustantiva

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - sustantiva

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/sustantiva
      - SECRET_KEY=sustantiva-secret-key-change-in-production
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    depends_on:
      - postgres
    networks:
      - sustantiva
    hostname: backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_TARGET=http://backend:8000
    depends_on:
      - backend
    networks:
      - sustantiva
    hostname: frontend

networks:
  sustantiva:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 10.89.0.0/16

volumes:
  postgres_data:
